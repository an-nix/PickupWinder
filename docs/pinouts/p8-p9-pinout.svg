<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <style>
    .hdr { font: bold 18px sans-serif; }
    .pin { font: 12px monospace; }
    .label { font: 13px sans-serif; }
    .box { fill:#111827; stroke:#000; stroke-width:2 }
    .used { fill: #ffcc00; }
    .unused { fill: #efefef; }
    .note { font: 12px sans-serif; fill:#333 }
  </style>

  <!-- Title -->
  <text x="600" y="36" text-anchor="middle" class="hdr">PickupWinder — P8 / P9 pinout (used pins)</text>

  <!-- P8 column -->
  <rect x="40" y="80" width="480" height="560" rx="8" class="box" fill="#f7fafc" />
  <text x="280" y="110" text-anchor="middle" class="hdr">P8 (header)</text>

  <!-- P9 column -->
  <rect x="680" y="80" width="480" height="560" rx="8" class="box" fill="#f7fafc" />
  <text x="920" y="110" text-anchor="middle" class="hdr">P9 (header)</text>

  <!-- P8 pins (only showing used pins with approximate position) -->
  <!-- P8_11, P8_12 are near top; P8_33,P8_35 lower down; P8_15,P8_16 mid -->
  <g id="p8-pins">
    <circle cx="160" cy="170" r="12" class="used" stroke="#000"/>
    <text x="190" y="175" class="pin">P8_11 — Encoder1 A</text>

    <circle cx="160" cy="210" r="12" class="used" stroke="#000"/>
    <text x="190" y="215" class="pin">P8_12 — Encoder1 B</text>

    <circle cx="160" cy="300" r="12" class="used" stroke="#000"/>
    <text x="190" y="305" class="pin">P8_15 — ENDSTOP_1 (R31[15])</text>

    <circle cx="160" cy="340" r="12" class="used" stroke="#000"/>
    <text x="190" y="345" class="pin">P8_16 — ENDSTOP_2 (R31[14])</text>

    <circle cx="160" cy="460" r="12" class="used" stroke="#000"/>
    <text x="190" y="465" class="pin">P8_33 — Encoder2 A / eQEP</text>

    <circle cx="160" cy="500" r="12" class="used" stroke="#000"/>
    <text x="190" y="505" class="pin">P8_35 — Encoder2 B / eQEP</text>
  </g>

  <!-- P9 pins -->
  <g id="p9-pins">
    <circle cx="800" cy="180" r="12" class="used" stroke="#000"/>
    <text x="830" y="185" class="pin">P9_25 — EN_A (Spindle EN) R30[7]</text>

    <circle cx="800" cy="220" r="12" class="used" stroke="#000"/>
    <text x="830" y="225" class="pin">P9_29 — DIR_A (Spindle DIR) R30[1]</text>

    <circle cx="800" cy="260" r="12" class="used" stroke="#000"/>
    <text x="830" y="265" class="pin">P9_31 — STEP_A (Spindle STEP) R30[0]</text>

    <circle cx="800" cy="360" r="12" class="used" stroke="#000"/>
    <text x="830" y="365" class="pin">P9_41 — EN_B (Lateral EN) R30[6]</text>

    <circle cx="800" cy="400" r="12" class="used" stroke="#000"/>
    <text x="830" y="405" class="pin">P9_28 — DIR_B (Lateral DIR) R30[3]</text>

    <circle cx="800" cy="440" r="12" class="used" stroke="#000"/>
    <text x="830" y="445" class="pin">P9_30 — STEP_B (Lateral STEP) R30[2]</text>

    <circle cx="800" cy="520" r="12" class="used" stroke="#000"/>
    <text x="830" y="525" class="pin">P9_12 — HX711 SCK</text>

    <circle cx="800" cy="560" r="12" class="used" stroke="#000"/>
    <text x="830" y="565" class="pin">P9_14 — HX711 DOUT</text>

    <circle cx="800" cy="600" r="12" class="used" stroke="#000"/>
    <text x="830" y="605" class="pin">P9_23 — Footswitch</text>
  </g>

  <!-- Legend -->
  <rect x="40" y="660" width="1120" height="34" fill="#fff8e1" stroke="#f1c40f"/>
  <text x="60" y="684" class="note">Legend: highlighted pins are used by the PickupWinder project. PRU mappings (R30/R31) shown where applicable.</text>

  <!-- Footer / sources -->
  <text x="60" y="700" class="note">Generated from project pin mapping (pru/include/pru_regs.h, copilot instructions). Export to PNG/PDF with README in this folder.</text>
</svg>
